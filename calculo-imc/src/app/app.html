<h1>Calculadora IMC</h1>
<input type="number" [(ngModel)]="peso" placeholder="Peso(Kg)">
<input type="number" [(ngModel)]="altura" placeholder="Alturs(ex.1.75)">
<button (click)="calcularIMC()">Calcular</button>
<div *ngIf="resultado">
  <p>Seu IMC:{{ imc }}</p>
  <p>Situação:<strong>{{ resultado }}</strong></p>
</div>
